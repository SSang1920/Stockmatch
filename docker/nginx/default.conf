server {
  listen 80;
  server_name stockmatch.kro.kr www.stockmatch.kro.kr;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name stockmatch.kro.kr www.stockmatch.kro.kr;

  ssl_certificate /etc/letsencrypt/live/stockmatch.kro.kr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stockmatch.kro.kr/privkey.pem;

  # SSL 보안 고도화 프로토콜 세팅
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # React 정적 빌드 결과 경로
  root /usr/share/nginx/html;
  index index.html;

  # Gzip - 정적 자원 전송 최적화
  gzip on;
  gzip_types text/plain application/javascript application/json text/css image/svg+xml;
  gzip_min_length 1024;

  # SPA 라우팅
  location / {
      try_files $uri /index.html;
  }

  # /api 프록시 설정
  location /api/ {
      proxy_pass http://backend:8080;

      # 프록시 헤더 설정
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_set_header X-Forwarded-Proto https;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      client_max_body_size 20m;
  }

  # 헬스체크
  location = /healthz {
      return 200 'OK';
      add_header Content-Type text/plain;
  }
}
