spring:
  datasource:
    url: jdbc:mysql://localhost:3307/stockdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  docker:
    compose:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-client}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-secret}
            redirect-uri: http://localhost:3000/auth/google/callback
            scope: profile,email

          naver:
            client-id: ${NAVER_CLIENT_ID:dev-naver-client}
            client-secret: ${NAVER_CLIENT_SECRET:dev-naver-client}
            redirect-uri: http://localhost:3000/auth/naver/callback
            scope: name,email,profile_image
            authorization-grant-type: authorization_code
            client-name : Naver

          kakao:
            client-id: ${KAKAO_CLIENT_ID:dev-kakao-client}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-kakao-secret}
            redirect-uri: http://localhost:3000/auth/kakao/callback
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: profile_nickname, profile_image, account_email
            client-name : Kakao

        provider:
          google:
            issuer-uri: https://accounts.google.com

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
social:
  kakao:
    admin-key: ${KAKAO_ADMIN_KEY}

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: debug

finnhub:
  base-url: https://finnhub.io/api/v1
  api-key: ${FINNHUB_API_KEY:dev-finnhub-key}