spring:
  datasource:
    url: jdbc:mysql://localhost:3307/stockdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  docker:
    compose:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-client}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-secret}
            redirect-uri: http://localhost:8080/api/auth/callback/google
            scope: profile,email

          naver:
            client-id: ${NAVER_CLIENT_ID:dev-naver-client}
            client-secret: ${NAVER_CLIENT_SECRET:dev-naver-client}
            redirect-uri: http://localhost:8080/api/auth/callback/naver
            scope: name,email,profile_image
            authorization-grant-type: authorization_code
            client-name : Naver

          kakao:
            client-id: ${KAKAO_CLIENT_ID:dev-kakao-client}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-kakao-secret}
            redirect-uri: http://localhost:8080/api/auth/callback/kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: profile_nickname, profile_image, account_email
            client-name : Kakao

        provider:
          google:
            issuer-uri: https://accounts.google.com

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
social:
  kakao:
    admin-key: ${KAKAO_ADMIN_KEY}

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: debug

kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: ${KIS_APP_KEY:dev-kis-key}
  app-secret: ${KIS_APP_SECRET:dev-kis-secret}
  tr-id:
      kr:
        real-time: FHKST01010100      # 국내주식 현재가 시세 조회 트랜잭션 ID
        daily-price: FHKST03010100    # 국내주식 기간별 시세 조회 트랜잭션 ID
        index: FHPUP02100000          # 국내업종 현재지수 조회 트랜잭션 ID
      us:
        real-time: HHDFS76200200      # 해외주식 현재가 시세 조회 트랜잭션 ID
        daily-price: HHDFS76240000    # 해외주식 기간별 시세 조회 트랜잭션 ID
        index: FHKST03030100          # 해외주식 종목/지수/환율 기간별 시세 조회 트랜잭션 ID


price:
  cache:
    ttl-seconds: 10
  refresh-ms: 10000
  enable-scheduler: true

namecache:
  prefix: secname
  ttl-seconds: 604800
  kr-namespace: KR

import:
  krx:
    enabled: true
    load-kospi: true
    load-kosdaq: true
    kospi-location: classpath:import/kospi_code.csv
    kosdaq-location: classpath:import/kosdaq_code.csv
    encoding: UTF-8
  us:
    enabled: true
    load-nasdaq: true
    load-nyse: true
    nasdaq-location: classpath:import/nasdaq_code.csv
    nyse-location: classpath:import/nyse_code.csv
    encoding: UTF-8

bok:
  api:
    key: ${BOK_API_KEY}

alphavantage:
  base-url: "https://www.alphavantage.co"

dart:
  api:
    key: ${DART_API_KEY}
    base-url: "https://opendart.fss.or.kr/api"

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY}
  salt: ${ENCRYPTION_SALT}

