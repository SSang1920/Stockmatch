spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: stock-redis
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 30

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-client}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-secret}
            redirect-uri: http://stockmatch.kro.kr/api/auth/callback/google
            scope: profile,email

          naver:
            client-id: ${NAVER_CLIENT_ID:dev-naver-client}
            client-secret: ${NAVER_CLIENT_SECRET:dev-naver-client}
            redirect-uri: http://stockmatch.kro.kr/api/auth/callback/naver
            scope: name,email,profile_image
            authorization-grant-type: authorization_code
            client-name: Naver

          kakao:
            client-id: ${KAKAO_CLIENT_ID:dev-kakao-client}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-kakao-secret}
            redirect-uri: http://stockmatch.kro.kr/api/auth/callback/kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: profile_nickname, profile_image, account_email
            client-name: Kakao

        provider:
          google:
            issuer-uri: https://accounts.google.com

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
social:
  kakao:
    admin-key: ${KAKAO_ADMIN_KEY}

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off
  file:
    name: /var/log/stockmatch/app.log

server:
  forward-headers-strategy: native
  error:
    include-message: never

kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: ${KIS_APP_KEY:dev-kis-key}
  app-secret: ${KIS_APP_SECRET:dev-kis-secret}

price:
  cache:
    ttl-seconds: 10
  refresh-ms: 10000
  enable-scheduler: true

namecache:
  prefix: secname
  ttl-seconds: 604800
  kr-namespace: KR

import:
  krx:
    enabled: true
    load-kospi: true
    load-kosdaq: true
    kospi-location: classpath:import/kospi_code.csv
    kosdaq-location: classpath:import/kosdaq_code.csv
    encoding: UTF-8
  us:
    enabled: true
    load-nasdaq: true
    load-nyse: true
    nasdaq-location: classpath:import/nasdaq_code.csv
    nyse-location: classpath:import/nyse_code.csv
    encoding: UTF-8

bok:
  api:
    key: ${BOK_API_KEY}

alphavantage:
  base-url: "https://www.alphavantage.co"

dart:
  api:
    key: ${DART_API_KEY}
    base-url: "https://opendart.fss.or.kr/api"

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY}
  salt: ${ENCRYPTION_SALT}

openai:
  api:
    url: "https://api.openai.com/v1/chat/completions"
    key: ${OPENAI_API_KEY}
    model: "gpt-4.1-mini"