spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: 127.0.0.1
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-id
            client-secret: test-google-secret
            redirect-uri: http://localhost/redirect/google
            scope: profile,email
            authorization-grant-type: authorization_code

          naver:
            client-id: test-naver-id
            client-secret: test-naver-secret
            redirect-uri: http://localhost/redirect/naver
            scope: name,email,profile_image
            authorization-grant-type: authorization_code
            client-name : Naver

          kakao:
            client-id: test-kakao-id
            client-secret: test-kakao-secret
            redirect-uri: http://localhost/redirect/kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: profile_nickname, profile_image, account_email
            client-name : Kakao

        provider:
          google:
            issuer-uri: https://accounts.google.com
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

social:
  kakao:
    admin-key: test-kakao-admin

management:
  endpoints:
    web:
      exposure:
        include: health,info

finnhub:
  base-url: https://mock.example
  api-key: test-token

kis:
  base-url: https://mock.example
  app-key: test-app-key
  app-secret: test-app-secret
  tr-id: TEST_TR_ID

bok:
  api:
    key: test-api-key

price:
  cache:
    ttl-seconds: 600

namecache:
  prefix: secname
  ttl-seconds: 604800
  kr-namespace: KR

import:
  krx:
    enabled: true
    load-kospi: true
    load-kosdaq: true
    kospi-location: classpath:import/kospi_code.csv
    kosdaq-location: classpath:import/kosdaq_code.csv
    encoding: UTF-8